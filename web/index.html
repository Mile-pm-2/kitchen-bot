<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кухня</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <h1 id="page-title">Смена</h1>
            <span id="user-badge" class="badge"></span>
        </header>

        <main id="content" class="content">
            <div class="empty-state" id="loading-state">
                <div class="empty-icon empty-icon-loading"></div>
                <p>Загрузка...</p>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-tab="shift">
                <span class="nav-icon nav-icon-shift" aria-hidden="true"></span>
                <span>Смена</span>
            </button>
            <button class="nav-btn" data-tab="revision">
                <span class="nav-icon nav-icon-revision" aria-hidden="true"></span>
                <span>Ревизия</span>
            </button>
            <button class="nav-btn" data-tab="recipes">
                <span class="nav-icon nav-icon-recipes" aria-hidden="true"></span>
                <span>ТТК</span>
            </button>
            <button class="nav-btn chef-only hidden" data-tab="orders">
                <span class="nav-icon nav-icon-orders" aria-hidden="true"></span>
                <span>Заказ</span>
                <span id="orders-badge" class="nav-badge hidden">0</span>
            </button>
            <button class="nav-btn admin-only hidden" data-tab="users">
                <span class="nav-icon nav-icon-users" aria-hidden="true"></span>
                <span>Роли</span>
            </button>
        </nav>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button class="modal-close">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-footer" class="modal-footer"></div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
