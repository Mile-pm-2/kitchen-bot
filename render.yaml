# Деплой на Render.com через Docker (Python 3.11)
# В Render: New Web Service → подключить репозиторий → Runtime: Docker

services:
  - type: web
    name: kitchen-bot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: WEBHOOK_MODE
        value: "true"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: WEBAPP_URL
        sync: false
